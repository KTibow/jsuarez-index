name: Sync Neural MMO streams

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

concurrency:
  group: neuralmmo-stream-sync
  cancel-in-progress: false

env:
  CHANNEL_STREAMS_URL: https://www.youtube.com/@neuralmmo/streams

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: ipv4
          mode: wireguard

      - name: Set up yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: false

      - name: Fetch stream captions
        env:
          YOUTUBE_COOKIE_HEADER: ${{ secrets.YOUTUBE_COOKIE_HEADER }}
        run: |
          set -euo pipefail
          mkdir -p streams
          metadata_file="$RUNNER_TEMP/stream-info.jsonl"
          cookie_file="$RUNNER_TEMP/youtube-cookies.txt"
          cookie_args=()
          if [ -n "${YOUTUBE_COOKIE_HEADER:-}" ]; then
            printf '# Netscape HTTP Cookie File\n' > "$cookie_file"
            IFS=';' read -ra cookies <<< "$YOUTUBE_COOKIE_HEADER"
            for cookie in "${cookies[@]}"; do
              cookie="${cookie# }"
              name="${cookie%%=*}"
              value="${cookie#*=}"
              secure=FALSE
              if [[ "$name" == __Secure-* ]]; then
                secure=TRUE
              fi
              printf '.youtube.com\tTRUE\t/\t%s\t0\t%s\t%s\n' "$secure" "$name" "$value" >> "$cookie_file"
            done
            cookie_args+=(--cookies "$cookie_file")
          fi

          yt-dlp \
            "${cookie_args[@]}" \
            --skip-download \
            --yes-playlist \
            --sleep-requests 3 \
            --sleep-subtitles 5 \
            --write-auto-subs \
            --sub-langs "en" \
            --sub-format "vtt" \
            --print-to-file "after_video:%()j" "$metadata_file" \
            --output "streams/%(id)s.%(ext)s" \
            "$CHANNEL_STREAMS_URL"

          shopt -s nullglob
          caption_files=(streams/*.vtt)
          if [ "${#caption_files[@]}" -eq 0 ]; then
            printf 'No stream caption files were written\n' >&2
            exit 1
          fi

      - name: Normalize stream files
        run: scripts/normalize-stream-vtts.py

      - name: Upload caption artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuralmmo-stream-captions
          path: streams/*.vtt

      - name: Commit caption updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streams
          if git diff --cached --quiet; then
            echo "No stream caption changes to commit"
            exit 0
          fi
          git commit -m "Sync Neural MMO stream captions"
          git push
