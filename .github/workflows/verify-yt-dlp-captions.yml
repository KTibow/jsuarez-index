name: Sync YouTube captions

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: "Optional newline-separated YouTube URLs/IDs. Defaults to .github/youtube-caption-urls.txt"
        required: false
        default: ""
      use_warp:
        description: "Try Cloudflare WARP before calling YouTube"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

concurrency:
  group: youtube-caption-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Cloudflare WARP
        if: ${{ inputs.use_warp || vars.YOUTUBE_CAPTIONS_USE_WARP == 'true' }}
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: ipv4
          mode: wireguard

      - name: Set up yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: false

      - name: Build URL list
        env:
          VIDEO_URLS: ${{ inputs.video_urls }}
        run: |
          set -euo pipefail
          if [ -n "${VIDEO_URLS:-}" ]; then
            printf '%s\n' "$VIDEO_URLS" > "$RUNNER_TEMP/youtube-caption-urls.txt"
          else
            cp .github/youtube-caption-urls.txt "$RUNNER_TEMP/youtube-caption-urls.txt"
          fi
          python - <<'PY'
          from pathlib import Path

          source = Path(__import__('os').environ['RUNNER_TEMP']) / 'youtube-caption-urls.txt'
          urls = []
          for raw_line in source.read_text(encoding='utf-8').splitlines():
              line = raw_line.split('#', 1)[0].strip()
              if line:
                  urls.append(line)
          if not urls:
              raise SystemExit('No YouTube URLs/IDs configured')
          source.write_text('\n'.join(dict.fromkeys(urls)) + '\n', encoding='utf-8')
          print(f'Syncing {len(dict.fromkeys(urls))} video(s)')
          PY

      - name: Fetch captions
        env:
          YOUTUBE_COOKIE_HEADER: ${{ secrets.YOUTUBE_COOKIE_HEADER }}
        run: |
          set -euo pipefail
          mkdir -p captions
          cookie_file="$RUNNER_TEMP/youtube-cookies.txt"
          cookie_args=()
          if [ -n "${YOUTUBE_COOKIE_HEADER:-}" ]; then
            printf '# Netscape HTTP Cookie File\n' > "$cookie_file"
            IFS=';' read -ra cookies <<< "$YOUTUBE_COOKIE_HEADER"
            for cookie in "${cookies[@]}"; do
              cookie="${cookie# }"
              name="${cookie%%=*}"
              value="${cookie#*=}"
              secure=FALSE
              if [[ "$name" == __Secure-* ]]; then
                secure=TRUE
              fi
              printf '.youtube.com\tTRUE\t/\t%s\t0\t%s\t%s\n' "$secure" "$name" "$value" >> "$cookie_file"
            done
            cookie_args+=(--cookies "$cookie_file")
          fi
          yt-dlp \
            "${cookie_args[@]}" \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs "en.*" \
            --sub-format "vtt" \
            --extractor-args "youtube:player_client=android_vr" \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            --output "captions/%(id)s.%(ext)s" \
            --batch-file "$RUNNER_TEMP/youtube-caption-urls.txt"
          shopt -s nullglob
          caption_files=(captions/*.vtt)
          if [ "${#caption_files[@]}" -eq 0 ]; then
            printf 'No caption files were written\n' >&2
            exit 1
          fi
          for caption_file in "${caption_files[@]}"; do
            if [ -s "$caption_file" ]; then
              exit 0
            fi
          done
          printf 'Caption files were empty\n' >&2
          exit 1

      - name: Show caption preview
        run: |
          set -euo pipefail
          python -c 'from pathlib import Path; caption_file = next(Path("captions").glob("*.vtt")); print(caption_file); print(caption_file.stat().st_size, "bytes"); print("\n".join(caption_file.read_text(encoding="utf-8").splitlines()[:40]))'

      - name: Upload caption artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-captions
          path: captions/*.vtt

      - name: Commit caption updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add captions .github/youtube-caption-urls.txt
          if git diff --cached --quiet; then
            echo "No caption changes to commit"
            exit 0
          fi
          git commit -m "Sync YouTube captions"
          git push
