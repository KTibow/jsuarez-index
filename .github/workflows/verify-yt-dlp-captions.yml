name: Verify yt-dlp captions

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube URL to test"
        required: false
        default: "https://www.youtube.com/watch?v=QXXQXFwOD_I&pp=0gcJCR4LAYcqIYzv"
  schedule:
    - cron: "17 9 * * 1"

jobs:
  captions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: false

      - name: Fetch captions
        env:
          VIDEO_URL: ${{ inputs.video_url || 'https://www.youtube.com/watch?v=QXXQXFwOD_I&pp=0gcJCR4LAYcqIYzv' }}
          YOUTUBE_COOKIE_HEADER: ${{ secrets.YOUTUBE_COOKIE_HEADER }}
        run: |
          set -euo pipefail
          mkdir -p captions
          cookie_file="$RUNNER_TEMP/youtube-cookies.txt"
          cookie_args=()
          if [ -n "${YOUTUBE_COOKIE_HEADER:-}" ]; then
            printf '# Netscape HTTP Cookie File\n' > "$cookie_file"
            IFS=';' read -ra cookies <<< "$YOUTUBE_COOKIE_HEADER"
            for cookie in "${cookies[@]}"; do
              cookie="${cookie# }"
              name="${cookie%%=*}"
              value="${cookie#*=}"
              secure=FALSE
              if [[ "$name" == __Secure-* ]]; then
                secure=TRUE
              fi
              printf '.youtube.com\tTRUE\t/\t%s\t0\t%s\t%s\n' "$secure" "$name" "$value" >> "$cookie_file"
            done
            cookie_args+=(--cookies "$cookie_file")
          fi
          yt-dlp \
            "${cookie_args[@]}" \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs "en.*" \
            --sub-format "vtt" \
            --extractor-args "youtube:player_client=android_vr" \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            --output "captions/%(id)s.%(ext)s" \
            "$VIDEO_URL"
          shopt -s nullglob
          caption_files=(captions/*.vtt)
          if [ "${#caption_files[@]}" -eq 0 ]; then
            printf 'No caption files were written\n' >&2
            exit 1
          fi
          for caption_file in "${caption_files[@]}"; do
            if [ -s "$caption_file" ]; then
              exit 0
            fi
          done
          printf 'Caption files were empty\n' >&2
          exit 1

      - name: Show caption preview
        run: |
          set -euo pipefail
          python -c 'from pathlib import Path; caption_file = next(Path("captions").glob("*.vtt")); print(caption_file); print(caption_file.stat().st_size, "bytes"); print("\n".join(caption_file.read_text(encoding="utf-8").splitlines()[:40]))'

      - name: Upload caption artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-caption-smoke-test
          path: captions/*.vtt
