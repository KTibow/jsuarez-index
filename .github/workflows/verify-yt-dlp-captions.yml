name: Verify yt-dlp captions

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  captions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: false

      - name: Fetch captions
        run: |
          set -euo pipefail
          mkdir -p captions
          yt-dlp \
            --skip-download \
            --write-auto-subs \
            --sub-langs "en.*" \
            --sub-format "vtt" \
            --extractor-args "youtube:player_client=web" \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            --output "captions/%(id)s.%(ext)s" \
            "https://www.youtube.com/watch?v=QXXQXFwOD_I&pp=0gcJCR4LAYcqIYzv"
          python - <<'PY'
from pathlib import Path

caption_files = list(Path("captions").glob("*.vtt"))
if not caption_files:
    raise SystemExit("No caption files were written")
for caption_file in caption_files:
    if caption_file.stat().st_size > 0:
        raise SystemExit(0)
raise SystemExit("Caption files were empty")
          PY

      - name: Show caption preview
        run: |
          set -euo pipefail
          python - <<'PY'
from pathlib import Path

caption_file = next(Path("captions").glob("*.vtt"))
print(caption_file)
print(caption_file.stat().st_size, "bytes")
print("\n".join(caption_file.read_text(encoding="utf-8").splitlines()[:40]))
          PY

      - name: Upload caption artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-caption-smoke-test
          path: captions/*.vtt
